{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold">Edit Profil</h3>
                
                <form method="POST" action="/edit-profile" enctype="multipart/form-data">
                    
                    <div class="mb-4 text-center">
                        <label class="form-label d-block">Foto Profil Saat Ini</label>
                        {% if user.foto_profil == 'default.jpg' %}
                            <img src="https://via.placeholder.com/150" class="rounded-circle mb-3" width="120" height="120">
                        {% else %}
                            <img src="{{ url_for('static', filename='uploads/' + user.foto_profil) }}" class="rounded-circle mb-3" width="120" height="120" style="object-fit: cover;">
                        {% endif %}
                        <input class="form-control form-control-sm" type="file" name="foto" accept=".jpg, .jpeg, .png">
                        <small class="text-muted">Maksimal 2MB (JPG, JPEG, PNG)</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" value="{{ user.nama }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/profile" class="btn btn-secondary">Batal</a>
                        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

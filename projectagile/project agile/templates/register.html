{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold">Daftar Akun Baru</h3>
                
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" id="nama" placeholder="Contoh: Cheristine Kayla" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" id="email" placeholder="nama@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" placeholder="Minimal 6 karakter" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-3">Daftar Sekarang</button>
                    <div class="text-center small">
                        Sudah punya akun? <a href="/login" class="text-decoration-none">Login di sini</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

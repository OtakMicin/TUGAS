{% extends 'base.html' %}

{% block content %}
<style>
    .user-msg-bubble {
        background: #007bff;
        color: white;
        padding: 12px 18px;
        border-radius: 20px 20px 0 20px;
        display: inline-block;
        max-width: 80%;
        box-shadow: 0 4px 10px rgba(0, 123, 255, 0.1);
    }
    .ai-msg-bubble {
        background: white;
        color: #333;
        padding: 12px 18px;
        border-radius: 20px 20px 20px 0;
        display: inline-block;
        max-width: 80%;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 1px solid #eee;
    }
    .chat-container-user { text-align: right; width: 100%; margin-bottom: 15px; }
    .chat-container-ai { text-align: left; width: 100%; margin-bottom: 15px; }
</style>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-primary text-white p-3 d-flex align-items-center">
                    <i class="bi bi-robot fs-4 me-2"></i>
                    <h5 class="mb-0 fw-bold">HealthTech AI Assistant</h5>
                </div>
                
                <div class="card-body bg-light" id="chat-box" style="height: 480px; overflow-y: auto; display: flex; flex-direction: column; padding: 20px;">
                    <div class="chat-container-ai">
                        <div class="ai-msg-bubble">
                            <strong>🤖 AI Dokter:</strong> Halo! Saya asisten kesehatan Anda. Apa keluhan Anda hari ini?
                        </div>
                    </div>
                    {% for chat in chats %}
                    <div class="chat-container-user">
                        <div class="user-msg-bubble">{{ chat.pesan_user }}</div>
                    </div>
                    <div class="chat-container-ai">
                        <div class="ai-msg-bubble">
                            <strong>🤖 AI Dokter:</strong><br>{{ chat.balasan_ai | safe }}
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="card-footer bg-white border-0 p-3">
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control border-primary rounded-pill px-4" placeholder="Ketik gejala Anda...">
                        <button class="btn btn-primary rounded-circle ms-2 shadow d-flex align-items-center justify-content-center" 
                                id="send-btn" type="button" onclick="kirimPesan()" style="width: 50px; height: 50px;">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    box.scrollTop = box.scrollHeight;

    async function kirimPesan() {
        const input = document.getElementById('user-input');
        const msg = input.value.trim();
        if (!msg) return;

        const userHtml = `<div class="chat-container-user"><div class="user-msg-bubble">${msg}</div></div>`;
        box.insertAdjacentHTML('beforeend', userHtml);
        input.value = '';
        box.scrollTop = box.scrollHeight;

        const loadId = "L-" + Date.now();
        const loadHtml = `<div class="chat-container-ai" id="${loadId}"><div class="ai-msg-bubble"><em>Sedang menganalisis...</em></div></div>`;
        box.insertAdjacentHTML('beforeend', loadHtml);
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            document.getElementById(loadId).remove();

            const aiHtml = `
                <div class="chat-container-ai">
                    <div class="ai-msg-bubble">
                        <strong>🤖 AI Dokter:</strong><br>${data.response}
                    </div>
                </div>
            `;
            box.insertAdjacentHTML('beforeend', aiHtml);
            box.scrollTop = box.scrollHeight;
        } catch (e) {
            document.getElementById(loadId).innerHTML = "Gagal terhubung.";
        }
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') kirimPesan();
    });
</script>
{% endblock %}
